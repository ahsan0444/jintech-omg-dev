name: Claude Code

# AI assistance on PRs and issues via @claude mentions — official Anthropic
# action (github.com/anthropics/claude-code-action). Complements ci.yml
# (deterministic test gate); does not replace it.
#
# Setup required once: add the ANTHROPIC_API_KEY repository secret, or run
# `/install-github-app` from Claude Code in a checkout of this repo for the
# guided GitHub-app + secret setup.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Bash(python3 -m unittest discover -s tests -v),Bash(python -m compileall hook-scripts servers tests)"
            --system-prompt "This is a Claude Code plugin repo (Python hooks + skill markdown). Run the unittest suite to verify changes. Follow CHANGES.md conventions when documenting."
