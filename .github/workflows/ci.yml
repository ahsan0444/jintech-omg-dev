name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        # windows-latest removed: pre-existing path-handling failures in
        # enforce-mcp-search (Bash branch) and skill-router — see README.
        # Restore once Windows path normalisation is fixed.
        os: [ubuntu-latest]
        python-version: ["3.12", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile all Python (hooks, server, tests)
        run: python -m compileall -q hook-scripts servers tests

      - name: Validate all JSON files
        shell: python
        run: |
          import json, pathlib, sys
          failed = False
          for p in pathlib.Path(".").rglob("*.json"):
              if "venv" in p.parts or "node_modules" in p.parts:
                  continue
              try:
                  json.loads(p.read_text(encoding="utf-8"))
              except Exception as e:
                  print(f"BAD JSON: {p}: {e}")
                  failed = True
          sys.exit(1 if failed else 0)

      - name: Validate plugin manifest required fields
        shell: python
        run: |
          import json
          m = json.load(open(".claude-plugin/plugin.json", encoding="utf-8"))
          assert m["name"] and m["version"] and m["description"], "plugin.json missing required fields"

      - name: Make python3 available (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          PYDIR=$(dirname "$(which python)")
          cp "$PYDIR/python.exe" "$PYDIR/python3.exe" 2>/dev/null || true
          python3 --version

      - name: Run test suite
        shell: bash
        run: python -m unittest discover -s tests -v
